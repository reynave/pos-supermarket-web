  <style>
    .boot-loading {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(14, 165, 233, 0.16), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(34, 197, 94, 0.14), transparent 42%),
        #f4f7fb;
      font-family: 'Public Sans', sans-serif;
    }

    .boot-loading__card {
      width: min(90vw, 420px);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.32);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
      padding: 28px 24px;
      backdrop-filter: blur(6px);
    }

    .boot-loading__brand {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.01em;
      color: #0f172a;
      margin: 0;
    }

    .boot-loading__subtitle {
      margin: 6px 0 18px;
      font-size: 13px;
      color: #64748b;
    }

    .boot-loading__bar-wrap {
      height: 10px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
      position: relative;
    }

    .boot-loading__bar {
      height: 100%;
      width: 44%;
      border-radius: 999px;
      background: linear-gradient(90deg, #06b6d4 0%, #0ea5e9 60%, #22c55e 100%);
      animation: boot-loading-progress 1.3s ease-in-out infinite;
      transform-origin: left;
    }

    .boot-loading__status {
      margin: 12px 0 0;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    @keyframes boot-loading-progress {
      0% {
        transform: translateX(-35%) scaleX(0.72);
        opacity: 0.78;
      }
      50% {
        transform: translateX(85%) scaleX(1);
        opacity: 1;
      }
      100% {
        transform: translateX(210%) scaleX(0.78);
        opacity: 0.82;
      }
    }
  </style>
