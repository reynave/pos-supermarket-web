<div class="min-h-screen bg-background-light flex flex-col">
  <header class="fixed top-0 inset-x-0 z-50 grid grid-cols-3 items-center border-b border-slate-200 bg-white px-4 md:px-6 py-3 gap-3">
    <div class="justify-self-start">
      <button
        class="inline-flex items-center gap-2 rounded-xl h-10 px-3 bg-slate-100 text-slate-700 hover:bg-slate-200 transition-colors"
        (click)="goBack()">
        <span class="material-symbols-outlined text-[20px]">arrow_back</span>
        <span class="text-sm font-semibold">Back</span>
      </button>
    </div>

    <div class="justify-self-center text-center">
      <h1 class="text-xl md:text-2xl font-black tracking-tight text-slate-900">Sub Menu Report</h1>
    </div>

    <div class="justify-self-end text-right leading-tight">
      <p class="text-xs text-slate-500">Reports</p>
      <p class="text-sm font-bold text-slate-900">Choose report type</p>
    </div>
  </header>

  <main class="flex-1 max-w-5xl w-full mx-auto p-6 pt-24 md:p-8 md:pt-24">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <a
        routerLink="/report"
        class="group bg-white p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center text-center transition-all hover:shadow-md hover:border-primary/50 hover:-translate-y-1">
        <div class="size-20 rounded-2xl bg-primary/10 text-primary flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
          <span class="material-symbols-outlined text-4xl">summarize</span>
        </div>
        <h2 class="text-xl font-bold text-slate-900 mb-2">Shift Report</h2>
        <p class="text-slate-500 text-sm">View shift summary and daily sales metrics.</p>
      </a>

      <a
        routerLink="/daily-close-history"
        class="group bg-white p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center text-center transition-all hover:shadow-md hover:border-primary/50 hover:-translate-y-1">
        <div class="size-20 rounded-2xl bg-primary/10 text-primary flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
          <span class="material-symbols-outlined text-4xl">receipt_long</span>
        </div>
        <h2 class="text-xl font-bold text-slate-900 mb-2">Daily Close Report</h2>
        <p class="text-slate-500 text-sm">Review daily close result, discrepancy, and close recap.</p>
      </a>
    </div>
  </main>
</div>
