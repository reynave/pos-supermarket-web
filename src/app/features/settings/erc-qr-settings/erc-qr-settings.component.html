<div class="min-h-screen bg-background-light flex flex-col">
  <header class="grid grid-cols-3 items-center border-b border-slate-200 bg-white px-4 md:px-6 py-3 sticky top-0 z-50 gap-3">
    <div class="justify-self-start">
      <button
        class="inline-flex items-center gap-2 rounded-xl h-10 px-3 bg-slate-100 text-slate-700 hover:bg-slate-200 transition-colors"
        (click)="goBack()">
        <span class="material-symbols-outlined text-[20px]">arrow_back</span>
        <span class="text-sm font-semibold">Back</span>
      </button>
    </div>

    <div class="justify-self-center text-center">
      <h1 class="text-xl md:text-2xl font-black tracking-tight text-slate-900">ERC and QR</h1>
    </div>

    <div class="justify-self-end text-right leading-tight">
      <p class="text-xs text-slate-500">Settings</p>
      <p class="text-sm font-bold text-slate-900">Payment Configuration</p>
    </div>
  </header>

  <main class="flex-1 max-w-4xl w-full mx-auto p-6 md:p-8">
    <section class="bg-white rounded-2xl border border-slate-200 p-6 md:p-8 shadow-sm">
      <div class="flex items-start gap-4">
        <div class="size-14 rounded-xl bg-primary/10 text-primary flex items-center justify-center shrink-0">
          <span class="material-symbols-outlined text-3xl">qr_code_2</span>
        </div>
        <div>
          <h2 class="text-xl font-bold text-slate-900">ERC & QR Setup</h2>
          <p class="mt-1 text-sm text-slate-500">This page is ready as UI placeholder. Next step can be adding API endpoint, merchant account config, and connection test action.</p>
        </div>
      </div>

      <div class="mt-6 grid gap-4 md:grid-cols-2">
        <div class="rounded-xl border border-slate-200 p-4 bg-slate-50">
          <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">ERC Status</p>
          <p class="mt-2 text-sm font-bold text-slate-900">Not Configured</p>
        </div>
        <div class="rounded-xl border border-slate-200 p-4 bg-slate-50">
          <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">QR Status</p>
          <p class="mt-2 text-sm font-bold text-slate-900">Not Configured</p>
        </div>
      </div>
    </section>
  </main>
</div>
