<main class="flex h-screen flex-col overflow-hidden bg-background-light">
  <!-- Header -->
  <app-header [title]="'Transaction Complete'" [userName]="userName"></app-header>

  @if (loadError) {
    <div class="bg-red-50 border-b border-red-200 text-red-700 px-6 py-2 text-sm font-medium flex items-center gap-2">
      <span class="material-symbols-outlined text-lg">error</span>
      {{ loadError }}
    </div>
  }

  <!-- Content -->
  <div class="flex-1 overflow-hidden flex p-3 gap-8 max-w-6xl mx-auto w-full">
    <!-- Receipt Preview -->
    <div class="flex-1 flex flex-col items-center bg-slate-100 rounded-2xl p-3">
      
      <pre class="receipt-paper receipt-text bg-white p-4 shadow-lg">{{ renderedReceiptText }}</pre>
    </div>


    <!-- Action Buttons -->
    <div class="w-1/3 flex flex-col gap-4">
     

      <button class="flex items-center gap-4 w-full p-6 rounded-2xl bg-primary text-white shadow-lg shadow-orange-200 hover:scale-[1.02] transition-transform active:scale-95" (click)="printReceipt()">
        <span class="material-symbols-outlined text-3xl">print</span>
        <div class="text-left">
          <p class="text-lg font-bold leading-none">PRINT COPY</p>
          <p class="text-sm opacity-80">Thermal printer</p>
        </div>
      </button>
     

       <button
        class="flex items-center gap-4 w-full p-6 rounded-2xl bg-white border border-slate-200 hover:bg-slate-50 transition-colors active:scale-95"
        (click)="goToMenu()">
        <span class="material-symbols-outlined text-primary text-3xl">home</span>
        <div class="text-left">
          <p class="text-lg font-bold leading-none">BACK MENU</p>
          <p class="text-sm text-slate-500">Return to main menu</p>
        </div>
      </button>
      <div class="mt-auto">
        <button class="flex items-center gap-4 w-full p-6 rounded-2xl bg-emerald-600 text-white shadow-lg hover:bg-emerald-700 transition-colors active:scale-95" (click)="newTransaction()">
          <span class="material-symbols-outlined text-3xl">add_shopping_cart</span>
          <div class="text-left">
            <p class="text-lg font-bold leading-none">NEW TRANSACTION</p>
            <p class="text-sm opacity-80">Start next customer</p>
          </div>
        </button>
      </div>
    </div>
  </div>
</main>
