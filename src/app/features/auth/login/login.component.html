<div class="login-page bg-background-light min-h-screen flex flex-col items-center justify-center p-6 relative">
  

  <!-- Main Login Card -->
  <main class="w-full max-w-[540px]">
    <div class="bg-white shadow-2xl shadow-primary/10 rounded-[2rem] p-12 border border-slate-100">
      <!-- Branding Area -->
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-primary/10 text-primary mb-6">
          <span class="material-symbols-outlined text-5xl">storefront</span>
        </div>
        <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-2">Terminal Login</h1>
        <p class="text-slate-500 text-lg">Enter your credentials to start your shift</p>
      </div>

      <!-- Error Message -->
      @if (errorMessage()) {
        <div class="mb-6 flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 px-5 py-3.5 rounded-2xl">
          <span class="material-symbols-outlined text-xl">error</span>
          <span class="text-sm font-medium">{{ errorMessage() }}</span>
        </div>
      }

      <!-- Login Form -->
      <form class="space-y-8" (ngSubmit)="onSubmit()">
        <!-- Staff ID Field -->
        <div class="space-y-3">
          <label
            class="block text-sm font-bold text-slate-700 uppercase tracking-widest px-1"
            for="userId">
            Staff ID
          </label>
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
              <span class="material-symbols-outlined">badge</span>
            </div>
            <input
              id="userId"
              type="text"
              [(ngModel)]="userId"
              name="userId"
              class="block w-full h-16 pl-14 pr-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xl font-medium text-slate-900 placeholder:text-slate-400 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all"
              placeholder="Enter Employee ID"
              autocomplete="off"
              autofocus />
          </div>
        </div>

        <!-- Password Field -->
        <div class="space-y-3">
          <div class="flex justify-between items-center px-1">
            <label
              class="block text-sm font-bold text-slate-700 uppercase tracking-widest"
              for="password">
              Password
            </label>
          </div>
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
              <span class="material-symbols-outlined">lock</span>
            </div>
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              class="block w-full h-16 pl-14 pr-16 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xl font-medium text-slate-900 placeholder:text-slate-400 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all"
              placeholder="••••••••" />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute inset-y-0 right-0 pr-5 flex items-center text-slate-400 hover:text-slate-600 transition-colors">
              <span class="material-symbols-outlined">
                {{ showPassword() ? 'visibility_off' : 'visibility' }}
              </span>
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full h-20 bg-primary hover:bg-primary-dark text-white font-bold text-2xl rounded-2xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-3 mt-4 disabled:opacity-60 disabled:cursor-not-allowed disabled:active:scale-100">
          @if (loading()) {
            <svg class="animate-spin h-7 w-7 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <span>Logging in...</span>
          } @else {
            <span>Login to Terminal</span>
            <span class="material-symbols-outlined text-3xl">login</span>
          }
        </button>

        <!-- bukan tombol back ke setup -->
        <button
          type="button"
          (click)="goToSetup()"
          class="w-full h-12 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-2xl transition-colors flex items-center justify-center gap-2 mt-2">
          <span class="material-symbols-outlined text-sm">settings</span>
          Setup Connection
        </button>

      </form>
    </div>

    <!-- Footer Info -->
    <div class="mt-12 flex flex-col items-center gap-6">
      <div class="flex items-center gap-4">
        <div
          class="flex items-center gap-1.5 px-4 py-2 bg-slate-200/50 rounded-full text-xs font-bold text-slate-600">
          <span class="material-symbols-outlined text-sm">settings_remote</span>
          TERMINAL ID: {{ terminalId }}
        </div>
        <div
          class="flex items-center gap-1.5 px-4 py-2 bg-slate-200/50 rounded-full text-xs font-bold text-slate-600">
          <span class="material-symbols-outlined text-sm">update</span>
          V {{ appVersion }}
        </div>
      </div>
      
    </div>
  </main>

  <!-- Background Decoration -->
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
    <div class="absolute -bottom-[10%] -left-[10%] w-[30%] h-[30%] bg-primary/10 rounded-full blur-[100px]"></div>
  </div>
</div>
