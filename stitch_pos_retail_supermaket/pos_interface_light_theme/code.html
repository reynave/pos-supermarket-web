<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern POS Interface - Light Theme</title>
<!-- BEGIN: Scripts and Configuration -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            pos: {
              light: '#f8fafc',
              card: '#ffffff',
              accent: '#3b82f6',
              success: '#22c55e',
              danger: '#ef4444',
              warning: '#f59e0b',
              border: '#e2e8f0'
            }
          },
          fontFamily: {
            "sans": ["Public Sans", "sans-serif"]
          }
        }
      }
    }
  </script>
<!-- END: Scripts and Configuration -->
<style data-purpose="custom-scrollbar">
    /* Custom scrollbar for the transaction list to maintain clean UI */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
  </style>
<style data-purpose="layout-optimizations">
    /* Ensuring the interface fills the 24-inch screen perspective */
    body, html {
      height: 100%;
      overflow: hidden;
    }
    .main-viewport {
      height: calc(100vh - 100px); /* Adjusting for bottom bar height */
    }
  </style>
</head>
<body class="bg-pos-light text-slate-900 font-sans antialiased">
<!-- BEGIN: Main Interface Wrapper -->
<main class="flex h-screen flex-col overflow-hidden">
<!-- BEGIN: Top Navigation / Status Bar -->
<header class="h-14 bg-white border-b border-pos-border flex items-center justify-between px-6 shrink-0" data-purpose="status-bar">
<div class="flex items-center gap-4">
<span class="text-xl font-bold text-pos-accent">POSv2</span>
<span class="text-slate-500 text-sm">Register: #04 | Cashier: J. Smith</span>
</div>
<div class="flex items-center gap-6 text-sm">
<span class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-pos-success"></div> System Online</span>
<span class="font-mono text-slate-600" id="current-time">14:32:45</span>
</div>
</header>
<!-- END: Top Navigation / Status Bar -->
<div class="flex flex-1 overflow-hidden main-viewport">
<!-- BEGIN: Left Column - Transaction Summary (40% width) -->
<section class="w-[40%] flex flex-col border-r border-pos-border bg-slate-50/50" data-purpose="transaction-panel">
<!-- Transaction List Header -->
<div class="grid grid-cols-12 gap-2 p-4 bg-white text-slate-500 text-xs font-bold uppercase tracking-wider border-b border-pos-border">
<div class="col-span-7">Item</div>
<div class="col-span-2 text-center">Qty</div>
<div class="col-span-3 text-right">Price</div>
</div>
<!-- Scrollable Transaction Body -->
<div class="flex-1 overflow-y-auto custom-scrollbar p-3" id="transaction-list">
<!-- Sample Items -->
<div class="grid grid-cols-12 gap-2 p-4 mb-2 bg-white rounded-xl items-center border border-pos-border border-l-4 border-l-pos-accent shadow-sm">
<div class="col-span-7 font-semibold text-slate-800">Organic Bananas (1lb)</div>
<div class="col-span-2 text-center text-lg text-slate-600">1</div>
<div class="col-span-3 text-right text-lg font-mono font-bold text-slate-900">$0.89</div>
</div>
<div class="grid grid-cols-12 gap-2 p-4 mb-2 bg-white rounded-xl items-center border border-pos-border shadow-sm">
<div class="col-span-7 font-semibold text-slate-800">Whole Grain Sourdough</div>
<div class="col-span-2 text-center text-lg text-slate-600">2</div>
<div class="col-span-3 text-right text-lg font-mono font-bold text-slate-900">$9.00</div>
</div>
<div class="grid grid-cols-12 gap-2 p-4 mb-2 bg-white rounded-xl items-center border border-pos-border shadow-sm">
<div class="col-span-7 font-semibold text-slate-800">Greek Yogurt Multi-Pack</div>
<div class="col-span-2 text-center text-lg text-slate-600">1</div>
<div class="col-span-3 text-right text-lg font-mono font-bold text-slate-900">$12.49</div>
</div>
</div>
<!-- Transaction Totals -->
<div class="p-6 bg-white border-t border-pos-border shadow-[0_-4px_20px_rgba(0,0,0,0.03)]" data-purpose="totals-display">
<div class="flex justify-between text-slate-500 mb-1 font-medium">
<span>Subtotal</span>
<span>$22.39</span>
</div>
<div class="flex justify-between text-slate-500 mb-4 font-medium">
<span>Tax (8%)</span>
<span>$1.79</span>
</div>
<div class="flex justify-between items-end border-t border-slate-100 pt-4">
<span class="text-2xl font-bold text-slate-900">Total</span>
<span class="text-5xl font-black text-pos-accent font-mono">$24.18</span>
</div>
</div>
</section>
<!-- END: Left Column -->
<!-- BEGIN: Right Column - Functions and Keypad (60% width) -->
<section class="w-[60%] p-8 bg-pos-light flex flex-col gap-8" data-purpose="input-section">
<div class="flex-1 grid grid-cols-2 gap-8">
<!-- Left side of Right Column: Function Menu -->
<div class="grid grid-rows-5 gap-4">
<button class="bg-white border border-pos-border hover:bg-slate-50 active:bg-pos-accent active:text-white text-xl font-bold rounded-2xl shadow-sm transition-all text-slate-700">Qty</button>
<button class="bg-white border border-pos-border hover:bg-slate-50 active:bg-pos-accent active:text-white text-xl font-bold rounded-2xl shadow-sm transition-all text-slate-700">Price Change</button>
<button class="bg-white border border-pos-border hover:bg-slate-50 active:bg-pos-accent active:text-white text-xl font-bold rounded-2xl shadow-sm transition-all text-slate-700">Discount</button>
<button class="bg-white border border-pos-border hover:bg-slate-50 active:bg-pos-accent active:text-white text-xl font-bold rounded-2xl shadow-sm transition-all text-slate-700">No Sale</button>
<button class="bg-white border border-pos-border hover:bg-slate-50 active:bg-pos-accent active:text-white text-xl font-bold rounded-2xl shadow-sm transition-all text-slate-700 text-center px-4">Print Last Receipt</button>
</div>
<!-- Right side of Right Column: Numeric Keypad -->
<div class="flex flex-col gap-4">
<!-- Keypad Display/Input View -->
<div class="bg-white rounded-2xl p-6 border border-pos-border shadow-inner flex flex-col items-end justify-center min-h-[100px]">
<span class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Entry Input</span>
<span class="text-5xl font-mono font-black tracking-tighter text-slate-900" id="keypad-input">0</span>
</div>
<!-- Grid of numbers -->
<div class="flex-1 grid grid-cols-3 gap-3">
<button class="bg-white border border-pos-border hover:bg-slate-50 active:scale-95 text-3xl font-bold rounded-2xl shadow-sm transition-all text-slate-800">7</button>
<button class="bg-white border border-pos-border hover:bg-slate-50 active:scale-95 text-3xl font-bold rounded-2xl shadow-sm transition-all text-slate-800">8</button>
<button class="bg-white border border-pos-border hover:bg-slate-50 active:scale-95 text-3xl font-bold rounded-2xl shadow-sm transition-all text-slate-800">9</button>
<button class="bg-white border border-pos-border hover:bg-slate-50 active:scale-95 text-3xl font-bold rounded-2xl shadow-sm transition-all text-slate-800">4</button>
<button class="bg-white border border-pos-border hover:bg-slate-50 active:scale-95 text-3xl font-bold rounded-2xl shadow-sm transition-all text-slate-800">5</button>
<button class="bg-white border border-pos-border hover:bg-slate-50 active:scale-95 text-3xl font-bold rounded-2xl shadow-sm transition-all text-slate-800">6</button>
<button class="bg-white border border-pos-border hover:bg-slate-50 active:scale-95 text-3xl font-bold rounded-2xl shadow-sm transition-all text-slate-800">1</button>
<button class="bg-white border border-pos-border hover:bg-slate-50 active:scale-95 text-3xl font-bold rounded-2xl shadow-sm transition-all text-slate-800">2</button>
<button class="bg-white border border-pos-border hover:bg-slate-50 active:scale-95 text-3xl font-bold rounded-2xl shadow-sm transition-all text-slate-800">3</button>
<button class="bg-red-50 text-pos-danger border border-red-100 hover:bg-pos-danger hover:text-white active:scale-95 text-xl font-black rounded-2xl shadow-sm transition-all uppercase">CLR</button>
<button class="bg-white border border-pos-border hover:bg-slate-50 active:scale-95 text-3xl font-bold rounded-2xl shadow-sm transition-all text-slate-800">0</button>
<button class="bg-slate-100 text-slate-600 border border-pos-border hover:bg-slate-200 active:scale-95 text-2xl font-bold rounded-2xl shadow-sm transition-all flex items-center justify-center">
<svg class="w-10 h-10" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</div>
</div>
</section>
<!-- END: Right Column -->
</div>
<!-- BEGIN: Bottom Action Bar -->
<footer class="h-[100px] bg-white border-t border-pos-border p-4 flex gap-4 shrink-0" data-purpose="footer-controls">
<!-- Member Search -->
<button class="flex-1 bg-slate-100 text-slate-700 hover:bg-slate-200 active:scale-95 transition-all rounded-xl flex items-center justify-center gap-3 text-xl font-bold border border-slate-200">
<svg class="h-8 w-8 text-pos-accent" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
        Member Search
      </button>
<!-- Void Button -->
<button class="w-[15%] bg-red-50 text-pos-danger hover:bg-red-100 active:scale-95 transition-all border border-red-200 rounded-xl flex flex-col items-center justify-center text-xl font-bold uppercase">
<span class="text-[10px] opacity-70 tracking-widest">CANCEL</span>
        Void
      </button>
<!-- Pay Now Button -->
<button class="w-[35%] bg-pos-accent hover:bg-blue-600 active:scale-95 transition-all rounded-xl shadow-lg shadow-pos-accent/20 flex items-center justify-center gap-4 text-3xl font-black uppercase text-white">
<svg class="h-10 w-10" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
        Pay Now
      </button>
</footer>
<!-- END: Bottom Action Bar -->
</main>
<!-- END: Main Interface Wrapper -->
<script data-purpose="clock-update">
    /* Keeps the register time updated every second */
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
      document.getElementById('current-time').textContent = timeStr;
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>
<script>
    // Minimal keypad interaction logic for demo
    const display = document.getElementById('keypad-input');
    const keypadButtons = document.querySelectorAll('#input-section button');
    
    keypadButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.textContent.trim();
        if (!isNaN(val) && val !== '') {
          if (display.textContent === '0') display.textContent = val;
          else display.textContent += val;
        } else if (val === 'CLR') {
          display.textContent = '0';
        } else if (btn.querySelector('svg')) { // Backspace
          if (display.textContent.length > 1) {
            display.textContent = display.textContent.slice(0, -1);
          } else {
            display.textContent = '0';
          }
        }
      });
    });
  </script>
</body></html>
