<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0066ff", // Vibrant blue as requested for the terminal
                        "background-light": "#f8faff",
                        "background-dark": "#0a0f1a",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-6 transition-colors duration-300">
    <!-- Top Navigation / Status Bar -->
    <header class="fixed top-0 left-0 w-full px-8 py-6 flex items-center justify-between pointer-events-none">
        <div
            class="flex items-center gap-3 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-5 py-2.5 rounded-full shadow-sm border border-slate-200 dark:border-slate-800 pointer-events-auto">
            <div class="flex items-center gap-2 text-primary">
                <span class="material-symbols-outlined text-2xl">shopping_cart</span>
                <span class="font-bold text-lg tracking-tight text-slate-900 dark:text-slate-100">Supermarket POS</span>
            </div>
        </div>
        <div
            class="flex items-center gap-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-5 py-2.5 rounded-full shadow-sm border border-slate-200 dark:border-slate-800 pointer-events-auto">
            <div class="flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">System Status: Online</span>
            </div>
            <div class="h-4 w-px bg-slate-200 dark:bg-slate-700"></div>
            <div class="flex items-center gap-2 text-slate-500 dark:text-slate-400">
                <span class="material-symbols-outlined text-xl">wifi</span>
                <span class="material-symbols-outlined text-xl">schedule</span>
            </div>
        </div>
    </header>
    <!-- Main Login Card -->
    <main class="w-full max-w-[540px] animate-in fade-in zoom-in duration-500">
        <div
            class="bg-white dark:bg-slate-900 shadow-2xl shadow-primary/10 rounded-[2rem] p-12 border border-slate-100 dark:border-slate-800">
            <!-- Branding Area -->
            <div class="text-center mb-10">
                <div
                    class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-primary/10 text-primary mb-6">
                    <span class="material-symbols-outlined text-5xl">storefront</span>
                </div>
                <h1 class="text-4xl font-extrabold text-slate-900 dark:text-slate-100 tracking-tight mb-2">Terminal
                    Login</h1>
                <p class="text-slate-500 dark:text-slate-400 text-lg">Enter your credentials to start your shift</p>
            </div>
            <!-- Login Form -->
            <form class="space-y-8" onsubmit="return false;">
                <!-- Staff ID Field -->
                <div class="space-y-3">
                    <label
                        class="block text-sm font-bold text-slate-700 dark:text-slate-300 uppercase tracking-widest px-1">Staff
                        ID</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined">badge</span>
                        </div>
                        <input
                            class="block w-full h-16 pl-14 pr-5 bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl text-xl font-medium text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all"
                            placeholder="Enter Employee ID" type="text" />
                    </div>
                </div>
                <!-- Password Field -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center px-1">
                        <label
                            class="block text-sm font-bold text-slate-700 dark:text-slate-300 uppercase tracking-widest">Password</label>
                        <a class="text-sm font-bold text-primary hover:text-primary/80 transition-colors"
                            href="#">Forgot Password?</a>
                    </div>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined">lock</span>
                        </div>
                        <input
                            class="block w-full h-16 pl-14 pr-16 bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl text-xl font-medium text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all"
                            placeholder="••••••••" type="password" />
                        <button
                            class="absolute inset-y-0 right-0 pr-5 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"
                            type="button">
                            <span class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Login Button -->
                <button
                    class="w-full h-20 bg-primary hover:bg-primary/90 text-white font-bold text-2xl rounded-2xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-3 mt-4"
                    type="submit">
                    <span>Login to Terminal</span>
                    <span class="material-symbols-outlined text-3xl">login</span>
                </button>
            </form>
        </div>
        <!-- Footer Info -->
        <div class="mt-12 flex flex-col items-center gap-6">
            <div class="flex items-center gap-4">
                <div
                    class="flex items-center gap-1.5 px-4 py-2 bg-slate-200/50 dark:bg-slate-800/50 rounded-full text-xs font-bold text-slate-600 dark:text-slate-400">
                    <span class="material-symbols-outlined text-sm">settings_remote</span>
                    TERMINAL ID: T-842
                </div>
                <div
                    class="flex items-center gap-1.5 px-4 py-2 bg-slate-200/50 dark:bg-slate-800/50 rounded-full text-xs font-bold text-slate-600 dark:text-slate-400">
                    <span class="material-symbols-outlined text-sm">update</span>
                    V 2.4.0-STABLE
                </div>
            </div>
            <div
                class="w-full flex justify-center gap-8 border-t border-slate-200 dark:border-slate-800 pt-8 opacity-60">
                <div class="flex items-center gap-2 grayscale hover:grayscale-0 transition-all cursor-default">
                    <div class="w-8 h-8 bg-slate-300 dark:bg-slate-700 rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-sm">contactless</span>
                    </div>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">NFC
                        Ready</span>
                </div>
                <div class="flex items-center gap-2 grayscale hover:grayscale-0 transition-all cursor-default">
                    <div class="w-8 h-8 bg-slate-300 dark:bg-slate-700 rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-sm">print</span>
                    </div>
                    <span
                        class="text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Printer
                        Active</span>
                </div>
                <div class="flex items-center gap-2 grayscale hover:grayscale-0 transition-all cursor-default">
                    <div class="w-8 h-8 bg-slate-300 dark:bg-slate-700 rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-sm">qr_code_scanner</span>
                    </div>
                    <span
                        class="text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Scanner
                        OK</span>
                </div>
            </div>
        </div>
    </main>
    <!-- Background Decoration -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -left-[10%] w-[30%] h-[30%] bg-primary/10 rounded-full blur-[100px]"></div>
    </div>
</body>

</html>
